services:
  - type: web
    name: bearlz-cms
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # --timeout 180: /api/gerar chama Claude que pode demorar 20-40s para
    # gerar 8-14 slides. Default do gunicorn e 30s, o que causa 500 e HTML
    # de erro no lugar de JSON (frontend quebra com "Unexpected token '<'").
    startCommand: gunicorn app:app --workers 2 --timeout 180 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CMS_API_KEY
        generateValue: true
    disk:
      # Mount path APENAS para dados persistentes (DB + edits compartilhadas).
      # Os HTMLs dos carrosseis ficam no repo e são atualizados a cada deploy.
      # Se o mountPath cobrisse carrosseis/, ele "sombrearia" os arquivos do repo
      # e nunca veriamos atualizações.
      name: bearlz-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
