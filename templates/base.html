<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Bearlz CMS{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .badge-gray    { @apply bg-gray-100 text-gray-600 border border-gray-200; }
    .badge-green   { @apply bg-green-50 text-green-700 border border-green-200; }
    .badge-blue    { @apply bg-blue-50 text-blue-700 border border-blue-200; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Top bar -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-screen-xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-bold text-gray-900 text-lg hover:text-blue-600 transition-colors">
        <span class="text-blue-500">●</span>
        Bearlz CMS
      </a>
      <nav class="flex items-center gap-1">
        <a href="/" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors
          {% if request.endpoint == 'dashboard' %}bg-gray-100 text-gray-900{% endif %}">
          Dashboard
        </a>
        <a href="/calendario" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors
          {% if request.endpoint == 'calendario' %}bg-gray-100 text-gray-900{% endif %}">
          Calendário
        </a>
        <a href="/gabriel" class="relative px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-1.5
          {% if request.endpoint == 'gabriel_inbox' %}bg-purple-500 text-white{% else %}text-purple-600 hover:bg-purple-50{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Gabriel
          {% if gabriel_fila > 0 %}
          <span class="flex items-center justify-center min-w-[18px] h-[18px] px-1 rounded-full text-xs font-bold
            {% if request.endpoint == 'gabriel_inbox' %}bg-white text-purple-600{% else %}bg-purple-500 text-white{% endif %}">
            {{ gabriel_fila }}
          </span>
          {% endif %}
        </a>
        <a href="/gerar" class="px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-1
          {% if request.endpoint == 'pagina_gerar' %}bg-blue-500 text-white{% else %}text-blue-600 hover:bg-blue-50{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          Gerar
        </a>
        <button onclick="syncCarrosseis()"
          class="ml-2 px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-500 text-white hover:bg-blue-600 transition-colors flex items-center gap-1.5">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          Sincronizar
        </button>
      </nav>
    </div>
  </header>

  <!-- Toast notification -->
  <div id="toast" class="fixed top-16 right-4 z-50 hidden">
    <div class="bg-gray-900 text-white text-sm px-4 py-2.5 rounded-lg shadow-lg flex items-center gap-2">
      <span id="toast-msg"></span>
    </div>
  </div>

  <!-- Main content -->
  <main class="max-w-screen-xl mx-auto px-6 py-6">
    {% block content %}{% endblock %}
  </main>

  <script>
    function toast(msg, color='gray') {
      const el = document.getElementById('toast');
      const msg_el = document.getElementById('toast-msg');
      msg_el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 3000);
    }

    async function syncCarrosseis() {
      const btn = event.currentTarget;
      btn.disabled = true;
      btn.textContent = 'Sincronizando...';
      try {
        const r = await fetch('/api/sync', {method: 'POST'});
        const d = await r.json();
        toast(`Sincronizado — ${d.total} carrosseis`);
        setTimeout(() => location.reload(), 800);
      } catch(e) {
        toast('Erro ao sincronizar');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg> Sincronizar`;
      }
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
